<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Spirograph</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script type="text/javascript" src="gif.js"></script>
        <script type="text/javascript" src="gif.worker.js"></script>


    </head>
    <body>
        <canvas id="spiro" height="500" width="500"></canvas>
        <br>
        <button id="downloadZip" disabled>Generate GIF</button>
        <br>
<script>
const STEPS = 2000
const SCALE = 60

const SpiroCanvas = document.getElementById("spiro")
const ctx = SpiroCanvas.getContext("2d")

const width = SpiroCanvas.width
const height = SpiroCanvas.height
const center = {
    x: width / 2,
    y: height / 2
}

let lastTime = 0
function step(time) {
    let dt = (time - lastTime) / 1000
    lastTime = time
    draw(dt)
    requestAnimationFrame(step)
}

let c = 0
let a = 0
let a_dir = 1

let HueInitial = 100 / 360
let SatInitial = 0.75
let ValInitial = 0.80

let HueFinal = HueInitial + 1.0
let SatFinal = SatInitial
let ValFinal = ValInitial

let Hue = HueInitial
let Sat = SatInitial
let Val = ValInitial

ctx.strokeStyle = "rgb(102, 204, 51)"
ctx.lineWidth = 2

function draw(dt, completeness){
    ctx.clearRect(0,0,width, height)

    //c = (c + 0.05 * dt) % 2
    c = (2 * Math.PI) * (completeness) / 10
    a = (a + 1.0 * a_dir * dt)
    if (a > 4.2) {
        a = 8.4 - a //wraps the value of a back around
        a_dir = -1
    }
    if (a < 0){
        a = - a
        a_dir = 1
    }
    console.log(dt)
    let d
    if (a <= 1.15)                 d = 0
    else if (a >1.15 && a <= 1.35) d = -1.6 * 2.857 * (a - 1)
    else if (a >1.35 && a <= 2)    d = -1.6
    else if (a >2 && a <= 2.4)     d = -1.6 + 2.75 * (a - 2)
    else if (a >2.4 && a <= 2.8)   d = -0.48
    else if (a >2.8 && a <= 3.8)   d = -0.5 + 1 * (a - 2.8)
    else                           d = 0.5

    let b
    if      (a <=1)                 b = 0.6
    else if (a > 1 && a <= 1.15)    b = 0.6 * 100 * (a - 0.99)
    else if (a > 1.15 && a <= 1.35) b = -5 + ((3.5/0.2) * (a - 1.15))
    else if (a > 1.35 && a <= 2)    b = -1.5
    else if (a > 2 && a <= 2.4)     b = -1.5 + 3.25 * (a - 2)
    else                            b = -0.2


    for(let theta = 0; theta < 6*Math.PI; theta += 6*Math.PI / STEPS){
        const theta2 = theta + 6*Math.PI / STEPS

        const r1 = r_1(theta, b, d, c)
        const r2 = r_1(theta2, b, d, c)
        const r3 = r_2(theta, b, d, c)
        const r4 = r_2(theta2, b, d, c)

        const [ x1, y1 ] = polarToRect(r1 * SCALE, theta)
        const [ x2, y2 ] = polarToRect(r2 * SCALE, theta2)
        const [ x3, y3 ] = polarToRect(r3 * SCALE, theta)
        const [ x4, y4 ] = polarToRect(r4 * SCALE, theta2)

        ctx.beginPath()
        ctx.moveTo(x1, y1)
        ctx.lineTo(x2, y2)
        ctx.moveTo(x3, y3)
        ctx.lineTo(x4, y4)
        ctx.stroke()
    }
}

function r_1(theta, b, d, c) {
    return (((Math.abs(Math.cos((theta + c * Math.PI)*(5 / 6))) ** 0.8 / b) + 1.3)+((Math.abs(Math.sin((theta + c * Math.PI)*(5 / 6))) ** 2.4 / b)) * d)
}

function r_2(theta, b, d, c) {
    return (((Math.abs(Math.sin((theta + c * Math.PI)*(5 / 6))) ** 0.8 / b) + 1.3)+((Math.abs(Math.cos((theta + c * Math.PI)*(5 / 6))) ** 2.4 / b)) * d)
}

function polarToRect(r, theta){
    let y = r * Math.sin(theta) + center.y
    let x = r * Math.cos(theta) + center.x

    return [ x, y ]
}

//requestAnimationFrame(step)

const downloadZipBtn = document.getElementById('downloadZip')

let frameCount = 0
let time = 12

let zip = new JSZip()
let gif = new GIF({
        workers: 2,
        quality: 10,
        width: width,
        height: height,
        transparent: 0x000000
    })

function spiro(){
    let frames = time * 24
    let proxytimestep = 8.2 / frames //kinda faking this to cram real time into equation time because the equation arbitrarily sets a to bounce between 0 and 4.2, and I dont want to recalculate that to fit with a variable duration.
    
    for (let i = 0; i < frames; i++) {
        console.log("frame:", i)
        let completeness = i / ( frames + 16 )
        draw(proxytimestep, completeness)
        gradColor(frames)

        // SpiroCanvas.toBlob((blob) => {
        //     const reader = new FileReader()
        //     reader.onload = function() {
        //         zip.file(`${i}.png`, reader.result)
        //     }
        //     reader.readAsArrayBuffer(blob)
        // }, 'image/png')

        gif.addFrame(ctx, {copy: true, delay: 40})
    }

    downloadZipBtn.disabled = false;
}

spiro()

function gradColor(step) {
    Hue = (Hue + ((HueFinal - HueInitial) / step) ) % 1
    Sat = Math.min((Sat + ((SatFinal - SatInitial) / step) ) , 1)
    Val = Math.min((Val + ((ValFinal - ValInitial) / step) ) , 1)

    const [red, green, blue] = hsvToRgb(Hue, Sat, Val)
    ctx.strokeStyle = `rgb(${red}, ${green}, ${blue})`
}

downloadZipBtn.addEventListener('click', async () => {
    // let content = await zip.generateAsync({ type: "blob" })
    // let a = document.createElement('a')
    // a.href = URL.createObjectURL(content)
    // a.download = 'spirograph_frames.zip'
    // a.click()
    // URL.revokeObjectURL(a.href)

    gif.on('finished', function(blob) {
        window.open(URL.createObjectURL(blob));
    });

    gif.render();
})

function hsvToRgb(h, s, v) {
  var r, g, b;

  var i = Math.floor(h * 6);
  var f = h * 6 - i;
  var p = v * (1 - s);
  var q = v * (1 - f * s);
  var t = v * (1 - (1 - f) * s);

  switch (i % 6) {
    case 0: r = v, g = t, b = p; break;
    case 1: r = q, g = v, b = p; break;
    case 2: r = p, g = v, b = t; break;
    case 3: r = p, g = q, b = v; break;
    case 4: r = t, g = p, b = v; break;
    case 5: r = v, g = p, b = q; break;
  }

  return [ r * 255, g * 255, b * 255 ];
}


</script>
    </body>
</html>
